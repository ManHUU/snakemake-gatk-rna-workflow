# workflow/profiles/slurm/config.yaml
# Snakemake 9 profile for SLURM HPC execution.
#
# Account, partition, and the singularity --bind path are supplied at run time
# by run.sh — this file is fully portable, no edits required.

executor: slurm

# Per-rule resource overrides (these rules need more memory than the default)
set-resources:
  join_genotyping_scatter:
    mem_mb: 24576
  annotate_variant_filter:
    mem_mb: 8192
  GenomicsDB_scatter:
    mem_mb: 24576

# Execution strategy
# jobs caps simultaneous SLURM submissions; 25 matches the per-chromosome scatter.
jobs: 25
latency-wait: 60
restart-times: 0
keep-going: true
printshellcmds: true
rerun-incomplete: true

# Container settings
use-singularity: true
use-conda: true        # rules with `conda:` directives (e.g. annotate_variants)
                       # need this to auto-create + activate their env
singularity-prefix: "resources/containers"

# workflow/profiles/slurm/config.yaml
# Snakemake 9 profile for SLURM HPC execution.
#
# Account, partition, and the singularity --bind path are supplied at run time
# by run.sh — this file is fully portable, no edits required.

executor: slurm

# Default resources for any rule that does not specify them.
# Rule-level resources are the source of truth — these are only a safety net
# for jobs whose `resources:` block omits a key.
default-resources:
  - mem_mb=8000
  - runtime=600

# Execution strategy
# jobs caps simultaneous SLURM submissions; 25 matches the per-chromosome scatter.
jobs: 25
latency-wait: 60
restart-times: 2          # auto-retry failed jobs up to 2 times; rules with attempt-scaled
                          # mem_mb/runtime use this to recover from OOM kills on large samples
keep-going: true
printshellcmds: true
rerun-incomplete: true

# Container settings
use-singularity: true
singularity-prefix: "resources/containers"
